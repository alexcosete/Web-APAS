<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto | Asamblea Vecinal</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="page-main bg-red-custom min-vh-100">
    <section class="section-padding">
      <div class="container">
        <a href="index.html" class="back-link back-link-light"><i class="bi bi-arrow-left"></i> Volver al inicio</a>

        <div class="row align-items-center g-5 mt-3">
          <div class="col-lg-6">
            <h1 class="section-title text-white">Contacto</h1>
            <p class="fs-5">¿Quieres sumarte, colaborar o proponer una actividad? Escríbenos o ven a la próxima asamblea.</p>
            <p class="mb-2"><i class="bi bi-envelope me-2"></i> asamblea@barrio.org</p>
            <p class="mb-2"><i class="bi bi-geo-alt me-2"></i> Centro social del barrio</p>
            <p class="mb-0"><i class="bi bi-clock me-2"></i> Jueves alternos · 19:00 h</p>
          </div>

          <div class="col-lg-6">
            <div class="card-custom p-4 p-md-5 text-dark">
              <h2>Escríbenos directamente</h2>
              <form>
                <div class="mb-3">
                  <label class="form-label" for="contactoNombre">Nombre</label>
                  <input id="contactoNombre" type="text" class="form-control" placeholder="Tu nombre">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="contactoEmail">Email</label>
                  <input id="contactoEmail" type="email" class="form-control" placeholder="tu@email.com">
                </div>
                <div class="mb-3">
                  <label class="form-label" for="contactoMensaje">Mensaje</label>
                  <textarea id="contactoMensaje" class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                </div>
                <button type="button" class="btn btn-primary-custom">Enviar mensaje</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
